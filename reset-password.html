<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card border-0">
            <div class="card-body p-0">
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your new password</p>

                <form id="resetForm">
                    <div class="input-field">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="newPassword" placeholder="New Password" required>
                        <i class="bi bi-eye toggle-password" onclick="togglePassword('newPassword', this)"></i>
                    </div>

                    <div class="input-field">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                        <i class="bi bi-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>

                    <p id="errorMsg" class="text-danger small" style="display:none; margin-top:-10px; margin-bottom:15px;">
                        Passwords do not match
                    </p>

                    <p id="successMsg" class="text-success small" style="display:none; margin-bottom:15px;">
                        Password updated successfully
                    </p>

                    <button type="submit" class="btn auth-button">Update Password</button>

                    <p class="bottom-text">
                        <a href="login.html">← Back to Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, icon) {
            const pwd = document.getElementById(inputId);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        document.getElementById('confirmPassword').addEventListener('input', function() {
            errorMsg.style.display = 'none';
        });

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';
            successMsg.style.display = 'block';
        });
    </script>
</body>
</html>
