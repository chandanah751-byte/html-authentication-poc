<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card border-0">
            <div class="card-body p-0">
                <h1 class="auth-title">Forgot Password?</h1>
                <p class="auth-subtitle">Enter your email to reset password</p>

                <form id="forgotForm">
                    <div class="input-field">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" id="email" placeholder="Email Id" required>
                    </div>

                    <p id="errorMsg" class="text-danger small" style="display:none; margin-top:-10px; margin-bottom:15px;">
                        Please enter a valid email
                    </p>

                    <p id="successMsg" class="text-success small" style="display:none; margin-bottom:15px;">
                        Reset link sent to your email
                    </p>

                    <button type="submit" class="btn auth-button">Send Reset Link</button>

                    <p class="bottom-text">
                        <a href="login.html">← Back to Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        document.getElementById('email').addEventListener('input', function() {
            errorMsg.style.display = 'none';
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email.includes('@')) {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';
            successMsg.style.display = 'block';
        });
    </script>
</body>
</html>
