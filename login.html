<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card border-0">
            <div class="card-body p-0">
                <h1 class="auth-title">Login</h1>
                <p class="auth-subtitle">Sign in to continue</p>

                <form id="loginForm">
                    <div class="input-field">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" placeholder="Email Id" required>
                    </div>

                    <div class="input-field">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <i class="bi bi-eye toggle-password" onclick="togglePassword()"></i>
                    </div>

                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

                    <button type="submit" class="btn auth-button d-flex justify-content-center align-items-center gap-2" id="loginBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
                        <span id="loginText">Login</span>
                    </button>

                    <p class="bottom-text">Don't have an account? <a href="register.html">Register here</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const text = document.getElementById('loginText');

            spinner.classList.remove('d-none');
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
