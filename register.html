<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card border-0">
            <div class="card-body p-0">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Create your account</p>

                <form id="registerForm">
                    <div class="input-field">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-control" placeholder="Username" required>
                    </div>

                    <div class="input-field">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" placeholder="Email Id" required>
                    </div>

                    <div class="input-field">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <i class="bi bi-eye toggle-password" onclick="togglePassword(this)"></i>
                    </div>

                    <div class="input-field">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                        <i class="bi bi-eye toggle-password" onclick="togglePassword(this)"></i>
                    </div>

                    <p id="errorMsg" class="text-danger small" style="display:none; margin-top:-10px; margin-bottom:15px;">
                        Passwords do not match
                    </p>

                    <button type="submit" class="btn auth-button">Sign Up</button>

                    <p class="bottom-text">
                        Already have an account? <a href="login.html">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(icon) {
            const input = icon.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        const errorMsg = document.getElementById('errorMsg');

        document.getElementById('confirmPassword').addEventListener('input', function() {
            errorMsg.style.display = 'none';
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                return;
            }
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
