<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>
<body>
    <center>
    <h1>Register</h1>
    
    <form>
        <label for="name"></label><br>
        <input id="name" type="text"  name="name" placeholder="Username"> <br><br>
        
        <label for="email"></label><br>
        <input id="email" type="email"  name="email" placeholder="Email"> <br><br>
        
        <label for="phone"></label><br>
        <input id="phone" type="tel"  name="phone" placeholder="Phone No"> <br><br>
        
        <label for="password"></label><br>
        <input id="password" type="password"  name="password" placeholder="Password"> <br><br>
        
        <label for="confirm-password"></label><br>
        <input id="confirm-password" type="password"  name="confirm-password" placeholder="Confirm Password"> <br><br><br>
        
        <a href="login.html">
            <button type="button">Register</button>
        </a>
    </form>
    
    <br>
    
    <p>Have an account?  <a href="login.html"> LogIn</a></p>
    </center>
</body>
</html>
