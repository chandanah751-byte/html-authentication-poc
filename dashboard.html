<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dashboard">

    <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="#">MyApp</a>
        <div class="ms-auto">
            <a href="login.html" class="btn logout-btn text-decoration-none">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="mb-4">
            <h2 class="text-white">Welcome back 👋</h2>
            <p class="text-secondary">Here's your dashboard overview</p>
        </div>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-person-circle"></i>
                        <h5 class="card-title">Profile</h5>
                        <p class="card-text">Manage your account</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-gear"></i>
                        <h5 class="card-title">Settings</h5>
                        <p class="card-text">Configure preferences</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-bell"></i>
                        <h5 class="card-title">Notifications</h5>
                        <p class="card-text">View alerts</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-graph-up"></i>
                        <h5 class="card-title">Analytics</h5>
                        <p class="card-text">Track activity</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-headset"></i>
                        <h5 class="card-title">Support</h5>
                        <p class="card-text">Get help</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card border-0">
                    <div class="card-body text-center">
                        <i class="bi bi-file-earmark-text"></i>
                        <h5 class="card-title">Reports</h5>
                        <p class="card-text">View reports</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
